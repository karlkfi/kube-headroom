<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- A3 "Rising H — Climb" at the 32px raster: dashed amber ceiling, cyan H,
       right post dissolving upward (opacity floor .5 so no row vanishes). -->
  <rect width="32" height="32" rx="6" fill="#0a0e18"/>
  <g fill="#ffd23f">
    <rect x="6" y="4" width="2" height="1"/><rect x="10" y="4" width="2" height="1"/>
    <rect x="14" y="4" width="2" height="1"/><rect x="18" y="4" width="2" height="1"/>
    <rect x="22" y="4" width="2" height="1"/>
  </g>
  <g fill="#22e6ff">
    <rect x="6" y="16" width="6" height="13"/>
    <rect x="6" y="20" width="18" height="4"/>
    <rect x="18" y="18" width="6" height="11"/>
    <rect x="18" y="15" width="6" height="2" opacity=".9"/>
    <rect x="18" y="12" width="6" height="2" opacity=".68"/>
    <rect x="18" y="9" width="6" height="2" opacity=".5"/>
  </g>
</svg>
