{{- if .Values.prometheus.enable }}
{{/*
Prometheus ServiceMonitor for the HTTPS metrics endpoint. Requires the
Prometheus-Operator CRDs (monitoring.coreos.com). When metrics.certManagerTLS is
set, TLS is verified against the cert-manager-issued metrics-server-cert;
otherwise it falls back to insecureSkipVerify (the controller-runtime self-signed
serving cert), which is not recommended for production.
*/}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "kube-headroom.fullname" . }}-controller-manager-metrics-monitor
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kube-headroom.labels" . | nindent 4 }}
spec:
  endpoints:
    - path: /metrics
      port: https
      scheme: https
      bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
      tlsConfig:
        {{- if and .Values.certmanager.enable .Values.metrics.certManagerTLS }}
        serverName: {{ include "kube-headroom.fullname" . }}-controller-manager-metrics-service.{{ .Release.Namespace }}.svc
        insecureSkipVerify: false
        ca:
          secret:
            name: metrics-server-cert
            key: ca.crt
        cert:
          secret:
            name: metrics-server-cert
            key: tls.crt
        keySecret:
          name: metrics-server-cert
          key: tls.key
        {{- else }}
        insecureSkipVerify: true
        {{- end }}
  selector:
    matchLabels:
      {{- include "kube-headroom.selectorLabels" . | nindent 6 }}
{{- end }}
