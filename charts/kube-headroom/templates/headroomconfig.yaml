{{- if .Values.headroomConfig.create }}
{{/*
The singleton HeadroomConfig (name MUST be `cluster`, enforced by a CEL rule).
Off by default; enable via headroomConfig.create and tune headroomConfig.spec.
Requires the kube-headroom-crds chart (or crds.install=true) to be installed
first so the CRD exists.
*/}}
apiVersion: kube-headroom.dev/v1alpha1
kind: HeadroomConfig
metadata:
  name: cluster
  labels:
    {{- include "kube-headroom.labels" . | nindent 4 }}
spec:
  {{- toYaml .Values.headroomConfig.spec | nindent 2 }}
{{- end }}
