apiVersion: v1
kind: Service
metadata:
  name: {{ include "kube-headroom.fullname" . }}-controller-manager-metrics-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kube-headroom.labels" . | nindent 4 }}
spec:
  ports:
    - name: https
      port: 8443
      protocol: TCP
      targetPort: 8443
  selector:
    {{- include "kube-headroom.selectorLabels" . | nindent 4 }}
