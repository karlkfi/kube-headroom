{{- /* replicas gate: a 1-replica PDB with minAvailable:1 wedges node drains */ -}}
{{- if and .Values.podDisruptionBudget.enable (gt (int .Values.replicas) 1) }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "kube-headroom.fullname" . }}-controller-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kube-headroom.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "kube-headroom.selectorLabels" . | nindent 6 }}
{{- end }}
