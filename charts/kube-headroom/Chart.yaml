apiVersion: v2
name: kube-headroom
description: |
  Headroom is a Kubernetes controller that dynamically sets container CPU limits
  as a function of node slack, recomputed on scheduling events via the GA
  in-place pod resize subresource. This chart deploys the namespaced operator
  (manager Deployment, RBAC, metrics, and the opt-in birth-limit admission
  webhook). Install the kube-headroom-crds chart first, on its own lifecycle.
type: application
# Chart version — bump on any packaging or template change; consumers pin this.
version: 0.1.0
# appVersion tracks the manager image tag this chart defaults to (image.tag
# falls back to appVersion when unset).
appVersion: "0.1.0"
home: https://github.com/karlkfi/kube-headroom
sources:
  - https://github.com/karlkfi/kube-headroom
maintainers:
  - name: Karl Isenberg
# Helm's Chart.yaml schema has no license field; this is the Artifact Hub
# convention for declaring one.
annotations:
  artifacthub.io/license: Apache-2.0
keywords:
  - kube-headroom
  - cpu
  - autoscaling
  - in-place-resize
# The CRD ships as its OWN chart (kube-headroom-crds), installed separately —
# cluster-wide, on a lifecycle independent of this namespaced operator (see
# docs/plan/archive/kustomize-helm-migration.md). This chart never renders the
# CRD: co-installing a CRD and resources that use it in one Helm release is an
# anti-pattern (Helm resolves kinds before applying, so a HeadroomConfig would
# race the CRD registration), and bundling the CRD here would also mix
# cluster-wide schema changes into routine operator upgrades. Install the
# kube-headroom-crds chart first; for a single-file bundle use
# `make build-installer`, which renders both charts into dist/install.yaml.
