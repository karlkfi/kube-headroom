# This NetworkPolicy allows ingress traffic to the webhook server running as
# part of the controller-manager. The admission webhook is invoked by the
# kube-apiserver, which runs on the control plane using host networking. That
# traffic does NOT originate from a Pod in a labeled namespace, so it cannot be
# matched by a namespaceSelector/podSelector — selecting only 'webhook: enabled'
# namespaces would drop every admission request and break the webhook. Instead
# we admit the webhook port from any source; the TLS serving cert (cert-manager)
# and the apiserver's client authentication are what secure this path.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  labels:
    app.kubernetes.io/name: kube-headroom
    app.kubernetes.io/managed-by: kustomize
  name: allow-webhook-traffic
  namespace: system
spec:
  podSelector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: kube-headroom
  policyTypes:
    - Ingress
  ingress:
    # Allow ingress to the webhook server port from any source. The port is the
    # container's target port (9443), since NetworkPolicy matches the destination
    # port as seen by the Pod, not the Service port (443). No 'from' selector is
    # set because the kube-apiserver source is host-network and outside the Pod
    # network, so it cannot be selected by namespace or pod labels.
    - ports:
        - port: 9443
          protocol: TCP
