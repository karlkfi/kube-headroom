apiVersion: kube-headroom.dev/v1alpha1
kind: HeadroomConfig
metadata:
  labels:
    app.kubernetes.io/name: kube-headroom
    app.kubernetes.io/managed-by: kustomize
  # Singleton: the name MUST be "cluster" (enforced by a CEL validation rule).
  name: cluster
spec:
  policy: Proportional
  # Start in dry-run: compute targets, annotate pods, and emit metrics, but
  # issue no resize patches. Flip to false once you trust the recommendations.
  dryRun: true
  # Manage pods only in namespaces labeled kube-headroom.dev/mode=managed.
  # (Opt one pod out with kube-headroom.dev/mode=unmanaged.)
  namespaceSelector:
    matchLabels:
      kube-headroom.dev/mode: managed
  excludedNamespaces:
    - kube-system
  # Optionally carve out specific workloads even inside an opted-in namespace: a
  # pod is skipped when any of its ownerReferences matches. Kind is required;
  # apiGroup and name narrow the match.
  # excludedOwners:
  #   - kind: DaemonSet
  #     apiGroup: apps
  # Optionally exclude nodes where in-place resize is prohibited (static CPU/
  # Memory Manager or NUMA-pinned nodes). Windows nodes are excluded
  # automatically and need no selector.
  # excludedNodeSelector:
  #   matchLabels:
  #     kube-headroom.dev/resize: unsupported
  # Remaining fields shown at their defaults for discoverability.
  minBurstFloor: "1"
  maxMultiplier: "10"
  quantum: "10m"
  deadband:
    growPercent: 10
    shrinkPercent: 5
  debouncePeriod: 2s
  rateLimits:
    perNodePatchesPerSecond: 10
    clientQPS: 50
    clientBurst: 100
  # Birth-limit mutating webhook (failurePolicy: Ignore, scoped to managed
  # namespaces). Seeds limits.cpu = requests.cpu × initialMultiplier at pod-create
  # time for short-lived and boot-time-quota pods the controller can't reach in
  # time. dryRun above also suppresses seeding, so nothing is mutated until you
  # flip dryRun to false.
  webhook:
    enabled: true
    initialMultiplier: "2"
