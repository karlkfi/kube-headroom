apiVersion: kube-headroom.dev/v1alpha1
kind: HeadroomConfig
metadata:
  labels:
    app.kubernetes.io/name: kube-headroom
    app.kubernetes.io/managed-by: kustomize
  # Singleton: the name MUST be "cluster" (enforced by a CEL validation rule).
  name: cluster
spec:
  policy: Proportional
  # Start in dry-run: compute targets, annotate pods, and emit metrics, but
  # issue no resize patches. Flip to false once you trust the recommendations.
  dryRun: true
  # Manage pods only in namespaces labeled kube-headroom.dev/mode=managed.
  # (Opt one pod out with kube-headroom.dev/mode=unmanaged.)
  namespaceSelector:
    matchLabels:
      kube-headroom.dev/mode: managed
  excludedNamespaces:
    - kube-system
  # Remaining fields shown at their defaults for discoverability.
  minBurstFloor: "1"
  maxMultiplier: "10"
  quantum: "10m"
  deadband:
    growPercent: 10
    shrinkPercent: 5
  debouncePeriod: 2s
  rateLimits:
    perNodePatchesPerSecond: 10
    clientQPS: 50
    clientBurst: 100
