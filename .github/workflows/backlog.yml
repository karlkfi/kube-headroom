name: Backlog

# The pre-commit hook lints docs/STATUS.md locally, but that config is not
# cloned with the repo — this enforces the same format on pushes and PRs.
on:
  push:
    branches:
      - main
    paths:
      - docs/STATUS.md
      - scripts/lint-backlog.sh
  pull_request:
    paths:
      - docs/STATUS.md
      - scripts/lint-backlog.sh

permissions: {}

jobs:
  lint:
    permissions:
      contents: read
    name: Lint docs/STATUS.md
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Lint backlog
        run: bash scripts/lint-backlog.sh docs/STATUS.md
