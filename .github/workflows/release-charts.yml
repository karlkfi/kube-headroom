name: Release charts

# Publish both Helm charts to ghcr as OCI artifacts on a version tag. The chart
# version and appVersion are stamped from the tag (v1.2.3 -> 1.2.3), so the
# operator chart defaults its image.tag to the same version.
on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  push-charts:
    name: Package and push charts to ghcr
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Derive chart version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build the pinned helm binary
        run: make helm

      - name: Log in to ghcr (Helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            ./bin/helm registry login ghcr.io \
              --username "${{ github.actor }}" --password-stdin

      - name: Package and push both charts
        run: make helm-push CHART_VERSION=${{ steps.version.outputs.version }}
