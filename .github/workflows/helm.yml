name: Helm

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

jobs:
  charts:
    name: Lint, render, and drift-check the Helm charts
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Install kubeconform
        run: go install github.com/yannh/kubeconform/cmd/kubeconform@v0.8.0

      - name: Charts are in sync with generated manifests
        run: make verify-helm-sync

      - name: helm lint
        run: make helm-lint

      - name: helm template | kubeconform
        run: make helm-template
