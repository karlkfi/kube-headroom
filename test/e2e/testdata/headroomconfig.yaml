# HeadroomConfig for the e2e suite. Unlike the config/samples default this runs
# with dryRun: false so the controller issues real resize patches — the §10
# exit criteria are about observed limits, not dry-run logs. debouncePeriod is
# tightened to 1s so a neighbor's effect lands well inside the 5s SLO — the
# reconciler honors this value on the watch-event enqueue (§6.2), so a shorter
# period here genuinely speeds up the reaction.
apiVersion: kube-headroom.dev/v1alpha1
kind: HeadroomConfig
metadata:
  name: cluster
spec:
  policy: Proportional
  dryRun: false
  # Manage pods only in namespaces labeled kube-headroom.dev/mode=managed; the
  # suite labels its probe namespace and leaves the neighbor in an unmanaged one.
  namespaceSelector:
    matchLabels:
      kube-headroom.dev/mode: managed
  excludedNamespaces:
    - kube-system
  minBurstFloor: "1"
  maxMultiplier: "10"
  quantum: "10m"
  deadband:
    growPercent: 10
    shrinkPercent: 5
  debouncePeriod: 1s
  rateLimits:
    perNodePatchesPerSecond: 10
  # Birth-limit mutating webhook seeds limits.cpu = requests.cpu × initialMultiplier
  # at admission (§6.5). Stated explicitly (not left to the CRD default) so the
  # webhook birth-limit e2e case can assert an exact value — request × 2.
  webhook:
    enabled: true
    initialMultiplier: "2"
